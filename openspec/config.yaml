# ------------------------------------------------------------
# CRITÈRES DE PERFORMANCE
# ------------------------------------------------------------

performance_criteria:

  architecture_laravel_agent:
    weight: "35%"
    checks:
      - "Structured output garanti — contrat JSON respecté, données typées"
      - "Tools définis et appelés par l'agent (pas de réponses inventées)"
      - "Mémoire de conversation fonctionnelle"
      - "Queue + Job pour l'analyse en background"
      - "Form Requests sur création offre et soumission CV"
      - "Eloquent Casts corrects (enum recommandation, array champs JSON)"

  fonctionnalites:
    weight: "25%"
    checks:
      - "CRUD Offres complet"
      - "Analyse IA fonctionnelle (score + points forts + lacunes + recommandation)"
      - "Assistant conversationnel avec données réelles"
      - "Recommandation typée visible par offre et par candidat"

  workflow_ai_assisted:
    weight: "25%"
    checks:
      - "Laravel Boost installé et utilisé"
      - "Specs présentes dans specs/"
      - "AGENTS.md commité"
      - "Commits avec mention AI"
      - "Capacité à expliquer tools vs hallucination, queue vs synchrone, mémoire vs stateless"

  qualite_posture:
    weight: "15%"
    checks:
      - "Code expliqué et défendu"
      - "Cas limites gérés (CV vide, offre sans compétences, réponse IA hors schéma)"
      - "Zéro N+1 (Debugbar)"
      - "Dossier specs/ propre et versionné"